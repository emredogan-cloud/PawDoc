# PawDoc AI service — Fly.io config (Phase 0.3 placeholder).
# CRITICAL (roadmap risk): min_machines_running = 1 + auto_stop_machines = "off"
# keep exactly one machine always warm so there is NO cold start. Cold starts
# would later blow the P95 < 10s analysis latency budget.
app = "pawdoc-ai"
primary_region = "iad"  # adjust to sit near the prod Supabase region (0.2)

[build]

[http_service]
  internal_port = 8080
  force_https = true
  auto_start_machines = true
  auto_stop_machines = "off"
  min_machines_running = 1

  # GAP-A4: cap in-flight requests per machine so a burst can't exhaust the
  # thread pool and starve /health (which shares it). Excess queues/sheds.
  [http_service.concurrency]
    type = "requests"
    soft_limit = 20
    hard_limit = 25

[[http_service.checks]]
  grace_period = "5s"
  interval = "15s"
  method = "GET"
  path = "/health"
  timeout = "2s"

[[vm]]
  cpu_kind = "shared"
  cpus = 1
  memory = "512mb"
