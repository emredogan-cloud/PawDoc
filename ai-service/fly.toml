# Fly.io application configuration for the PawDoc AI service.
#
# This file is the deployment contract for `flyctl deploy`. Two real apps will
# exist in production: `pawdoc-ai-dev` and `pawdoc-ai-prod`. Each one's
# secrets are managed via `fly secrets set` (sourced from Doppler).
#
# Replace `pawdoc-ai-dev` below when creating the actual Fly apps:
#   fly apps create pawdoc-ai-dev --org pawdoc
#   fly apps create pawdoc-ai-prod --org pawdoc

app = "pawdoc-ai-dev"
primary_region = "iad"           # us-east; pick lowest-latency to userbase

kill_signal = "SIGINT"
kill_timeout = "30s"

[build]
  dockerfile = "Dockerfile"

[env]
  APP_ENV = "dev"
  LOG_LEVEL = "INFO"
  PORT = "8080"
  PYTHONUNBUFFERED = "1"

[http_service]
  internal_port = 8080
  force_https = true
  auto_stop_machines = "off"     # Disable auto-stop: warm machines only.
  auto_start_machines = true
  min_machines_running = 1       # No cold starts — required by P95 latency SLO.

  [[http_service.checks]]
    interval = "15s"
    timeout = "3s"
    grace_period = "10s"
    method = "get"
    path = "/health"

[[vm]]
  cpu_kind = "shared"
  cpus = 1
  memory = "512mb"
