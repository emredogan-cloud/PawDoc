name: pawdoc
description: "PawDoc — AI-native pet health triage app."
# Do NOT publish to pub.dev — this is a private application package.
publish_to: "none"

version: 0.1.0+1

environment:
  # Pin to the Flutter 3.41 / Dart 3.11 SDK channel. Raise here when the team
  # bumps the toolchain — CI uses this constraint to select its SDK.
  sdk: ^3.11.5
  flutter: ">=3.41.0"

# =============================================================================
# Runtime dependencies
# =============================================================================
# Phase 0 keeps this list short. Feature-specific packages (image, video,
# RevenueCat, Sentry, etc.) land in Phase 1 alongside the code that uses them.
dependencies:
  flutter:
    sdk: flutter

  # State management: compile-safe, async-first, testable.
  flutter_riverpod: ^2.6.1
  riverpod_annotation: ^2.6.1

  # Routing: type-safe, deep-link friendly.
  go_router: ^17.2.3

  # Material 3 iconography.
  cupertino_icons: ^1.0.8

  # Auth + DB client. Configured in Phase 0; used in Phase 1.
  supabase_flutter: ^2.8.2

  # Structured logging.
  logging: ^1.3.0

  # ---- Phase 1C additions -----------------------------------------------
  # Local key-value store for the onboarding draft + simple settings.
  shared_preferences: ^2.3.4

  # Camera + gallery picker, with native permission handling.
  image_picker: ^1.1.2

  # On-device JPEG re-encoding to keep uploads under the 2 MB budget.
  flutter_image_compress: ^2.3.0

  # Real-time online/offline status; used to gate analyze submissions.
  connectivity_plus: ^6.1.1

  # Locale-aware date formatting (DOB → age computation).
  intl: ^0.19.0

  # HTTP client for direct calls to Supabase Edge Functions when we need
  # raw headers (X-Request-ID) that the supabase_flutter SDK abstracts.
  http: ^1.2.2

  # ---- Phase 1D additions ----------------------------------------------
  # Subscription management — abstracts StoreKit + Play Billing + handles
  # entitlement sync via the RevenueCat webhook.
  purchases_flutter: ^8.4.0

  # Apple Sign-In (iOS only; the Android variant uses Apple's web flow).
  sign_in_with_apple: ^6.1.4

  # Error reporting + breadcrumbs.
  sentry_flutter: ^8.11.0

  # Push notifications — Phase 1D ships SDK + registration only; campaigns
  # arrive in Phase 3.
  onesignal_flutter: ^5.2.7

  # SHA-256 nonce for Apple Sign-In; small dep already pulled in transitively.
  crypto: ^3.0.6

  # ---- Sprint A2 additions --------------------------------------------
  # Open external URLs (ToS, Privacy, "find an emergency vet"). Promoted
  # from transitive dep to explicit so we control the version.
  url_launcher: ^6.3.1

  # Product analytics. Self-hostable; we run EU PostHog Cloud in prod.
  # Centralised through lib/shared/services/analytics_service.dart —
  # widgets must NEVER import this package directly.
  posthog_flutter: ^4.10.1

# =============================================================================
# Dev / build dependencies
# =============================================================================
dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0

  # Riverpod codegen toolchain (used in Phase 1+).
  build_runner: ^2.4.13
  riverpod_generator: ^2.6.3
  custom_lint: ^0.7.0
  riverpod_lint: ^2.6.3

  # Mocks for provider + service tests.
  mocktail: ^1.0.4

# =============================================================================
# Flutter section
# =============================================================================
flutter:
  uses-material-design: true
