# PawDoc mobile — analyzer + linter configuration.
#
# Foundation: flutter_lints (Flutter team's recommended set).
# We layer additional rules that match our coding standards:
# - strong mode is the default in modern Dart; we explicitly enforce no implicit
#   casts and no implicit dynamic.
# - Custom Riverpod lints catch provider misuse.

include: package:flutter_lints/flutter.yaml

analyzer:
  language:
    strict-casts: true
    strict-inference: true
    strict-raw-types: true
  errors:
    # Treat unused imports and dead code as errors — CI fails on these.
    unused_import: error
    unused_local_variable: error
    dead_code: error
    missing_required_param: error
    missing_return: error
    invalid_assignment: error
    todo: ignore
  exclude:
    - "**/*.g.dart"
    - "**/*.freezed.dart"
    - "build/**"
    - "ios/Pods/**"
    - "android/.gradle/**"
  plugins:
    - custom_lint

linter:
  rules:
    # ---- Correctness ------------------------------------------------------
    always_declare_return_types: true
    avoid_dynamic_calls: true
    avoid_type_to_string: true
    cancel_subscriptions: true
    close_sinks: true
    no_adjacent_strings_in_list: true
    prefer_void_to_null: true
    test_types_in_equals: true
    throw_in_finally: true
    unnecessary_statements: true

    # ---- Style ------------------------------------------------------------
    prefer_const_constructors: true
    prefer_const_constructors_in_immutables: true
    prefer_const_declarations: true
    prefer_const_literals_to_create_immutables: true
    prefer_final_locals: true
    prefer_final_in_for_each: true
    prefer_relative_imports: true
    prefer_single_quotes: true
    sort_pub_dependencies: false  # we group by purpose, not alphabetical
    sort_constructors_first: true
    sort_unnamed_constructors_first: true
    unawaited_futures: true
    use_super_parameters: true

    # ---- Safety / health-app specific ------------------------------------
    avoid_print: true                 # use logger, never print
    avoid_catches_without_on_clauses: true
    avoid_catching_errors: true
    only_throw_errors: true
    use_build_context_synchronously: true
