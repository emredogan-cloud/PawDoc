name: CI

# Runs on every PR (required status check for `main`) and on pushes to main.
on:
  pull_request:
  push:
    branches: [main]

permissions:
  contents: read

jobs:
  ai-service:
    name: AI service — ruff + pytest
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
      - name: Install deps
        run: pip install -r ai-service/requirements-dev.txt ruff
      - name: Ruff (static analysis)
        run: ruff check ai-service
      - name: Pytest
        working-directory: ai-service
        run: pytest -q

  shell-lint:
    name: ShellCheck (scripts)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: ludeeus/action-shellcheck@2.0.0 # GAP-D5: pin off @master (supply chain)
        with:
          scandir: ./scripts

  secret-scan:
    name: Secret scan (gitleaks)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  # RLS-02/INF-04: the RLS + deletion-cascade suite now applies EVERY migration
  # (a curated subset once let the RLS-01 deletion blocker ship unverified) and
  # is a required gate. GitHub's ubuntu runners provide Docker.
  rls-suite:
    name: RLS + deletion cascade (full migrations, Docker pg)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: test-rls.sh
        run: ./scripts/test-rls.sh

  # GAP-D5: the Edge free-tier / emergency-keyword / quota-gate / SSRF-key logic
  # is covered by node --test but was never gated in CI.
  node-tests:
    name: Edge shared tests (node --test)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
      - name: node --test (_shared)
        run: node --test supabase/functions/_shared/*.test.mjs

  # GAP-D5/B5: a placeholder or fabricated claim can never ship silently again.
  # NOTE: this job stays RED until GAP-B5 truthifies the store/web/legal copy —
  # that is the intended forcing function.
  no-placeholders:
    name: No placeholders / overclaims
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: verify-no-placeholders
        run: ./scripts/verify-no-placeholders.sh

  flutter:
    name: Flutter analyze + test + build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      # Java 17 is required by the Android Gradle config (sourceCompatibility 17).
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"
      - uses: subosito/flutter-action@v2
        with:
          channel: stable
      - name: Analyze & test
        working-directory: mobile
        run: |
          flutter pub get
          flutter analyze
          flutter test
      # Build the Android app so a broken release path fails CI instead of
      # shipping silently. A Kotlin/toolchain incompatibility (sentry_flutter
      # pinned to Kotlin 1.6 vs the Kotlin 2.x compiler) reached `main` undetected
      # because CI ran analyze+test but never built an APK. See
      # RELEASE_PATH_RECOVERY_REPORT.md.
      - name: Build Android artifacts
        working-directory: mobile
        run: |
          flutter build apk --debug
          flutter build appbundle
