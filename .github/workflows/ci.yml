name: CI

# Runs on every PR (required status check for `main`) and on pushes to main.
on:
  pull_request:
  push:
    branches: [main]

permissions:
  contents: read

jobs:
  ai-service:
    name: AI service — ruff + pytest
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
      - name: Install deps
        run: pip install -r ai-service/requirements-dev.txt ruff
      - name: Ruff (static analysis)
        run: ruff check ai-service
      - name: Pytest
        working-directory: ai-service
        run: pytest -q

  shell-lint:
    name: ShellCheck (scripts)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: ludeeus/action-shellcheck@master
        with:
          scandir: ./scripts

  secret-scan:
    name: Secret scan (gitleaks)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  flutter:
    name: Flutter analyze + test + build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      # Java 17 is required by the Android Gradle config (sourceCompatibility 17).
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"
      - uses: subosito/flutter-action@v2
        with:
          channel: stable
      - name: Analyze & test
        working-directory: mobile
        run: |
          flutter pub get
          flutter analyze
          flutter test
      # Build the Android app so a broken release path fails CI instead of
      # shipping silently. A Kotlin/toolchain incompatibility (sentry_flutter
      # pinned to Kotlin 1.6 vs the Kotlin 2.x compiler) reached `main` undetected
      # because CI ran analyze+test but never built an APK. See
      # RELEASE_PATH_RECOVERY_REPORT.md.
      - name: Build Android artifacts
        working-directory: mobile
        run: |
          flutter build apk --debug
          flutter build appbundle
