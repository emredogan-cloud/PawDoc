name: Deploy AI service

# Deploys ai-service to Fly.io on merge to main (only when the service changes).
# Requires repo secret FLY_API_TOKEN (see docs/runbooks/10-cicd-github-actions.md).
on:
  push:
    branches: [main]
    paths:
      - "ai-service/**"
      - ".github/workflows/deploy.yml"

# Never run two deploys at once; don't cancel an in-flight deploy.
concurrency:
  group: deploy-ai-service
  cancel-in-progress: false

permissions:
  contents: read

jobs:
  deploy:
    name: flyctl deploy
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: superfly/flyctl-actions/setup-flyctl@master
      - name: Deploy
        working-directory: ai-service
        run: flyctl deploy --remote-only
        env:
          FLY_API_TOKEN: ${{ secrets.FLY_API_TOKEN }}
      - name: Smoke check /health
        run: |
          for i in $(seq 1 10); do
            code=$(curl -s -o /dev/null -w '%{http_code}' https://pawdoc-ai.fly.dev/health || echo 000)
            if [ "$code" = "200" ]; then echo "health OK"; exit 0; fi
            echo "attempt $i: HTTP $code"; sleep 3
          done
          echo "::error::/health did not return 200 after deploy"; exit 1
