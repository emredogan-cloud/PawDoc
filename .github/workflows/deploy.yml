name: Deploy AI service

# GAP-D5: deploy ONLY after CI passes on main. Previously this ran on push
# regardless of CI state, so a red main push would still deploy. `workflow_run`
# cannot path-filter, so the ai-service deploy now runs on any green main CI;
# `fly deploy` is idempotent and /health-smoke-checked, so a no-op redeploy is
# harmless. Requires repo secret FLY_API_TOKEN (runbook 10).
on:
  workflow_run:
    workflows: ["CI"]
    types: [completed]
    branches: [main]

# Never run two deploys at once; don't cancel an in-flight deploy.
concurrency:
  group: deploy-ai-service
  cancel-in-progress: false

permissions:
  contents: read

jobs:
  deploy:
    name: flyctl deploy
    runs-on: ubuntu-latest
    if: ${{ github.event.workflow_run.conclusion == 'success' }}
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event.workflow_run.head_sha }}
      - uses: superfly/flyctl-actions/setup-flyctl@master
      - name: Deploy
        working-directory: ai-service
        run: flyctl deploy --remote-only
        env:
          FLY_API_TOKEN: ${{ secrets.FLY_API_TOKEN }}
      - name: Smoke check /health
        run: |
          for i in $(seq 1 10); do
            code=$(curl -s -o /dev/null -w '%{http_code}' https://pawdoc-ai.fly.dev/health || echo 000)
            if [ "$code" = "200" ]; then echo "health OK"; exit 0; fi
            echo "attempt $i: HTTP $code"; sleep 3
          done
          echo "::error::/health did not return 200 after deploy"; exit 1
